<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎤 Speech Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        #status {
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .listening { background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid #00e5ff; }
        .stopped { background: rgba(255,51,102,0.15); color: #ff3366; border: 1px solid #ff3366; }
        .wake { background: rgba(57,255,20,0.15); color: #39ff14; border: 1px solid #39ff14; }
        #live {
            font-size: 1.8rem;
            text-align: center;
            max-width: 600px;
            min-height: 60px;
            margin-bottom: 20px;
            color: #00e5ff;
        }
        #log {
            width: 100%;
            max-width: 700px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        .log-entry { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }
        .log-entry.wake-match { color: #39ff14; font-weight: bold; }
        .log-entry.interim { color: #555; }
        .timestamp { color: #444; margin-right: 8px; }
        button {
            margin: 10px;
            padding: 10px 24px;
            border: 1px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: rgba(0,229,255,0.1); }
    </style>
</head>
<body>
    <h1>🎤 Speech Recognition Test</h1>
    <p class="subtitle">Say "Hey Lumo" — this page shows everything your browser hears</p>

    <div id="status" class="stopped">⏸ Not started</div>

    <div id="live">...</div>

    <div>
        <button onclick="startListening()">▶ Start Listening</button>
        <button onclick="stopListening()">⏹ Stop</button>
    </div>

    <div id="log"></div>

    <script>
        const status = document.getElementById('status');
        const live = document.getElementById('live');
        const log = document.getElementById('log');
        let recognition = null;

        function addLog(text, cls = '') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'log-entry ' + cls;
            div.innerHTML = `<span class="timestamp">${time}</span>${text}`;
            log.prepend(div);
        }

        function startListening() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                status.textContent = '❌ Web Speech API not supported!';
                status.className = 'stopped';
                addLog('ERROR: Web Speech API not available. Use Chrome.', 'wake-match');
                return;
            }

            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                status.textContent = '🎤 Listening...';
                status.className = 'listening';
                addLog('Recognition started');
            };

            recognition.onresult = (event) => {
                const last = event.results.length - 1;
                const result = event.results[last];
                const text = result[0].transcript.trim();
                const confidence = (result[0].confidence * 100).toFixed(0);

                live.textContent = text;

                if (result.isFinal) {
                    const lower = text.toLowerCase();
                    const isWake = lower.includes('hey lumo') ||
                                   lower.includes('a lumo') ||
                                   lower.includes('hey limo') ||
                                   lower.includes('hey luma');

                    if (isWake) {
                        status.textContent = '✅ WAKE WORD DETECTED!';
                        status.className = 'wake';
                        addLog(`✅ WAKE WORD MATCH: "${text}" (${confidence}%)`, 'wake-match');
                    } else {
                        addLog(`Final: "${text}" (${confidence}%)`, '');
                    }
                } else {
                    addLog(`Interim: "${text}"`, 'interim');
                }
            };

            recognition.onerror = (event) => {
                addLog(`Error: ${event.error}`, '');
                if (event.error !== 'no-speech' && event.error !== 'aborted') {
                    status.textContent = `⚠ Error: ${event.error}`;
                    status.className = 'stopped';
                }
            };

            recognition.onend = () => {
                addLog('Recognition ended — restarting...');
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 200);
            };

            try {
                recognition.start();
            } catch(e) {
                addLog('Failed to start: ' + e.message);
            }
        }

        function stopListening() {
            if (recognition) {
                recognition.onend = null; // Prevent auto-restart
                recognition.stop();
                status.textContent = '⏸ Stopped';
                status.className = 'stopped';
                addLog('Stopped manually');
            }
        }
    </script>
</body>
</html>
